databases:
  - name: reckon-postgres
    databaseName: reckon
    user: reckon_user
    plan: free

services:
  - type: web
    name: reckon-dashboard-api
    env: python
    buildCommand: "pip install -r dashboard/api/requirements.txt"
    startCommand: "cd dashboard/api && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reckon-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
